services:
  # ---------------------------------------------------------------------------
  # Infrastructure: PostgreSQL
  # ---------------------------------------------------------------------------
  aichat-db:
    image: postgres:16
    environment:
      POSTGRES_DB: aichat
      POSTGRES_USER: aichat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - aichatdb:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aichat -d aichat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Infrastructure: Qdrant vector database
  # ---------------------------------------------------------------------------
  aichat-vector:
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdb:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" | timeout 2 bash -c \"exec 3<>/dev/tcp/localhost/6333; cat >&3; cat <&3\" | grep -q \"healthz check passed\"'"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # aichat-data: consolidated data service (port 8091)
  #   Replaces: aichat-database, aichat-memory, aichat-graph,
  #             aichat-planner, aichat-researchbox
  #
  #   Routes:
  #     /          — PostgreSQL article/image/cache REST (backward-compat)
  #     /memory/*  — SQLite episodic memory store
  #     /graph/*   — SQLite knowledge graph (NetworkX)
  #     /planner/* — SQLite task planner (DAG-aware)
  #     /research/*— RSS/feed discovery
  #     /jobs/*    — Durable async job system
  # ---------------------------------------------------------------------------
  aichat-data:
    build: ./docker/data
    environment:
      DATABASE_URL: postgresql://aichat:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@aichat-db:5432/aichat
      INTEL_GPU: "1"
      LIBVA_DRIVER_NAME: iHD
    depends_on:
      aichat-db:
        condition: service_healthy
    volumes:
      - datadb:/data
    devices:
      - ${INTEL_DRI_DEVICE:-/dev/dri}:${INTEL_DRI_DEVICE:-/dev/dri}
    group_add:
      - "${INTEL_VIDEO_GID:-39}"    # host video GID  — DRI card1
      - "${INTEL_RENDER_GID:-105}"  # host render GID — DRI renderD128 (Intel Arc OpenCL)
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8091/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # aichat-vision: consolidated media service (port 8099)
  #   Replaces: aichat-video, aichat-ocr
  #
  #   Routes:
  #     /          — Video analysis: /info, /frames, /thumbnail
  #     /ocr/*     — OCR: /ocr, /ocr/boxes, /ocr/path, /ocr/pdf, etc.
  # ---------------------------------------------------------------------------
  aichat-vision:
    build: ./docker/vision
    environment:
      DATABASE_URL: http://aichat-data:8091
      WORKSPACE: /workspace
      INTEL_GPU: "1"
      LIBVA_DRIVER_NAME: iHD
      SDXL_TURBO_MODEL_DIR: /app/models/sdxl_turbo
    depends_on:
      aichat-data:
        condition: service_healthy
    volumes:
      - /docker/human_browser/workspace:/workspace:rw
      - /mnt/nvmeINT/models/sdxl_turbo_ov:/app/models/sdxl_turbo:ro
    # Intel Arc A380: FFmpeg VA-API hw decode/encode + Tesseract OpenCL preprocessing.
    devices:
      - ${INTEL_DRI_DEVICE:-/dev/dri}:${INTEL_DRI_DEVICE:-/dev/dri}
    group_add:
      - "${INTEL_VIDEO_GID:-39}"    # host video GID  — DRI card1
      - "${INTEL_RENDER_GID:-105}"  # host render GID — DRI renderD128 (Intel Arc VA-API/OpenCL)
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8099/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # aichat-docs: consolidated document service (port 8101)
  #   Replaces: aichat-docs, aichat-pdf
  #
  #   Routes:
  #     /          — Document ingestor: /ingest, /ingest/url, /tables, /formats
  #     /pdf/*     — PDF operations: /pdf/read, /pdf/edit, /pdf/fill-form,
  #                  /pdf/merge, /pdf/split  (OCR delegated to aichat-vision)
  # ---------------------------------------------------------------------------
  aichat-docs:
    build: ./docker/docs
    environment:
      DATABASE_URL: http://aichat-data:8091
      OCR_URL: http://aichat-vision:8099
      WORKSPACE: /workspace
      INTEL_GPU: "1"
      LIBVA_DRIVER_NAME: iHD
    depends_on:
      aichat-data:
        condition: service_healthy
      aichat-vision:
        condition: service_healthy
    volumes:
      - /docker/human_browser/workspace:/workspace:rw
    devices:
      - ${INTEL_DRI_DEVICE:-/dev/dri}:${INTEL_DRI_DEVICE:-/dev/dri}
    group_add:
      - "${INTEL_VIDEO_GID:-39}"
      - "${INTEL_RENDER_GID:-105}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8101/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # aichat-sandbox: isolated code execution (port 8095)
  #   Renamed from: aichat-toolkit
  #   Non-root, minimal packages, controlled filesystem mounts.
  # ---------------------------------------------------------------------------
  aichat-sandbox:
    build: ./docker/sandbox
    environment:
      DATABASE_URL: http://aichat-data:8091
      INTEL_GPU: "1"
    depends_on:
      aichat-data:
        condition: service_healthy
    volumes:
      - ${HOME}/.config/aichat/tools:/data/tools
      - ${HOME}/git:/data/repos:ro
    devices:
      - ${INTEL_DRI_DEVICE:-/dev/dri}:${INTEL_DRI_DEVICE:-/dev/dri}
    group_add:
      - "${INTEL_VIDEO_GID:-39}"    # host video GID  — DRI card1
      - "${INTEL_RENDER_GID:-105}"  # host render GID — DRI renderD128 (Intel Arc OpenCL)
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8095/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # aichat-searxng: Self-hosted meta-search engine (port 8098)
  #   Proxies Google, Bing, DDG, Brave — no API keys, no bot detection.
  #   Used by web_search tool as the primary (Tier 0) search backend.
  # ---------------------------------------------------------------------------
  aichat-searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://aichat-searxng:8080
    volumes:
      - ./docker/searxng:/etc/searxng:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz 2>/dev/null | grep -q ok || wget -qO- http://localhost:8080/ >/dev/null 2>&1"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s

  # aichat-mcp: MCP HTTP/SSE gateway (port 8096)
  #   Exposes all tools to LM Studio and other MCP clients.
  #   Reachable at http://<host-ip>:8096/sse
  # ---------------------------------------------------------------------------
  aichat-mcp:
    build: ./docker/mcp
    ports:
      - "0.0.0.0:8096:8096"
    environment:
      # Consolidated service URLs
      DATABASE_URL:     http://aichat-data:8091
      MEMORY_URL:       http://aichat-data:8091/memory
      RESEARCH_URL:     http://aichat-data:8091/research
      TOOLKIT_URL:      http://aichat-sandbox:8095
      GRAPH_URL:        http://aichat-data:8091/graph
      VECTOR_URL:       http://aichat-vector:6333
      VIDEO_URL:        http://aichat-vision:8099
      OCR_URL:          http://aichat-vision:8099/ocr
      DOCS_URL:         http://aichat-docs:8101
      PLANNER_URL:      http://aichat-data:8091/planner
      PDF_URL:          http://aichat-docs:8101/pdf
      JOB_URL:          http://aichat-data:8091/jobs
      # SearXNG meta-search — Tier 0 for web_search (Google/Bing/DDG/images).
      SEARXNG_URL:      http://aichat-searxng:8080
      JUPYTER_URL:      http://aichat-jupyter:8098
      JUPYTER_API_KEY:  ${JUPYTER_API_KEY:-}
      # human_browser is connected to this network by the install script.
      BROWSER_URL:      http://human_browser:7081
      # Image generation — points at LM Studio (or any OpenAI-compatible image API).
      # Set IMAGE_GEN_MODEL to the exact model name shown in LM Studio to pin a model.
      # Set EMBED_MODEL to pin the embedding model (auto-detected from LM Studio if unset).
      IMAGE_GEN_BASE_URL: ${IMAGE_GEN_BASE_URL:-http://192.168.50.2:1234}
      IMAGE_GEN_MODEL:  "${IMAGE_GEN_MODEL:-}"
      # ComfyUI — dedicated diffusion server on WSL2 RTX 3090 (preferred for image gen)
      COMFYUI_URL: "${COMFYUI_URL:-http://aichat-comfyui:8388}"
      EMBED_MODEL: "${EMBED_MODEL:-}"
      # GPU idle TTL — auto-unload models after idle period (seconds, 0=disable)
      GPU_IDLE_TTL: "${GPU_IDLE_TTL:-600}"
      GPU_TTL_POLL_INTERVAL: "${GPU_TTL_POLL_INTERVAL:-60}"
      GPU_TTL_ENABLED: "${GPU_TTL_ENABLED:-true}"
      # Arc A380 local image generation (OpenVINO SDXL Turbo)
      VISION_GEN_URL: http://aichat-vision:8099/generate
      # MinIO S3-compatible object store for image pipeline
      MINIO_URL: http://aichat-minio:9002
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
      # CLIP embedding endpoint (aichat-vision)
      CLIP_URL: http://aichat-vision:8099/clip
      # Browser automation service
      BROWSER_AUTO_URL: http://aichat-browser:8104
      # Object/human detection
      DETECT_URL: http://aichat-vision:8099/detect
      # All tools are free/local — no paid API keys required.
      INTEL_GPU: "1"
      LIBVA_DRIVER_NAME: iHD
      # CLI agent chat (OAuth)
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      TEAM_SSH_HOST: "host.docker.internal"
      TEAM_SSH_PORT: "1337"
      TEAM_SSH_USER: "jalsarraf"
      TEAM_SSH_KEY: "/app/.ssh/team_key"
      TEAM_QWEN_MODEL: "${TEAM_QWEN_MODEL:-qwen/qwen3.5-9b}"
      TEAM_GEMINI_MODEL: "${TEAM_GEMINI_MODEL:-gemini-2.5-flash}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Read/write the browser screenshot workspace
      - /docker/human_browser/workspace:/browser-workspace
      - /home/jalsarraf/aipictures:/app/pictures
      # SSH key for CLI agent chat (Claude, Codex, Gemini)
      - /home/jalsarraf/.ssh/automation:/run/secrets/team_ssh_key:ro
      # Per-user workspace — scripts, images, documents
      - ./workspace:/workspace
    depends_on:
      aichat-data:
        condition: service_healthy
      aichat-vision:
        condition: service_healthy
      aichat-docs:
        condition: service_healthy
      aichat-sandbox:
        condition: service_healthy
      aichat-vector:
        condition: service_healthy
      aichat-searxng:
        condition: service_healthy
      aichat-minio:
        condition: service_healthy
      aichat-browser:
        condition: service_healthy
      aichat-jupyter:
        condition: service_healthy
    # Intel Arc A380: card1 (video) + renderD128 (render/OpenCL).
    devices:
      - ${INTEL_DRI_DEVICE:-/dev/dri}:${INTEL_DRI_DEVICE:-/dev/dri}
    group_add:
      - "${INTEL_VIDEO_GID:-39}"    # host video GID  — DRI card1
      - "${INTEL_RENDER_GID:-105}"  # host render GID — DRI renderD128 (Intel Arc OpenCL)
    # NVIDIA: uncomment the two blocks below (requires nvidia-container-toolkit on host)
    # runtime: nvidia
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8096/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # aichat-whatsapp: WhatsApp bot (optional, port 8097)
  #   Visit http://localhost:8097 to scan the QR code and pair a number.
  # ---------------------------------------------------------------------------
  aichat-whatsapp:
    build: ./docker/whatsapp
    environment:
      LM_STUDIO_URL: ${LM_STUDIO_URL:-http://192.168.50.2:1234}
      MCP_URL:       http://aichat-mcp:8096
      MEMORY_URL:    http://aichat-data:8091/memory
      BOT_NAME:      AI Assistant
      MAX_HISTORY:   "20"
      MAX_TOOL_ITER: "5"
      MAX_TOKENS:    "1024"
      ALLOW_GROUPS:  "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      aichat-data:
        condition: service_healthy
      aichat-mcp:
        condition: service_healthy
      aichat-sandbox:
        condition: service_healthy
    volumes:
      - whatsappauth:/data/auth
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # aichat-jupyter: persistent Python kernel service (port 8098)
  #   Provides stateful code execution: variables/DataFrames survive between calls.
  #   Full scientific stack: numpy, pandas, matplotlib, scipy, sklearn, seaborn, plotly.
  # ---------------------------------------------------------------------------
  aichat-jupyter:
    build: ./docker/jupyter
    environment:
      JUPYTER_API_KEY: ${JUPYTER_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8098/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # aichat-browser: headless Chromium with full keyboard/mouse (port 8104)
  #   Playwright-based, agentic browsing — navigate, click, type, screenshot.
  #   No external API keys needed.
  # ---------------------------------------------------------------------------
  aichat-browser:
    build: ./docker/browser
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8104/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Infrastructure: Redis/Valkey — context compaction cache (port 6379 internal)
  #   Used by the Arc A380 preprocessing pipeline as a fast cache for:
  #   - Compacted conversation contexts (TTL 1h)
  #   - Tool routing decisions (TTL 60s)
  #   - Optimized prompt cache (personality + model combos)
  #   Sub-millisecond reads. 512MB max, LRU eviction.
  # ---------------------------------------------------------------------------
  aichat-redis:
    image: valkey/valkey:8-alpine
    command: valkey-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - /mnt/nvmeINT/aichat/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Infrastructure: MinIO S3-compatible object store (ports 9001/9002)
  #   Console: http://localhost:9001  |  API: http://localhost:9002
  #   Used by the anime image pipeline to store downloaded images as objects.
  # ---------------------------------------------------------------------------
  aichat-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001" --address ":9002"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
    volumes:
      - miniodata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9002/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # aichat-inference: Intel Arc A380 OpenVINO inference (port 8105)
  #   Offloads embeddings from LM Studio (RTX 3090) to the local Intel Arc GPU.
  #   nomic-embed-text-v1.5 (768-dim) via OpenVINO — frees LM Studio model slots.
  #   Arc A380 = 6 GB VRAM, suitable for embeddings/classification, NOT LLMs.
  # ---------------------------------------------------------------------------
  aichat-inference:
    build: ./docker/inference
    environment:
      DEVICE: CPU   # CPU via OpenVINO; add /dev/dri + DEVICE=GPU for Arc acceleration
      MODEL_DIR: /app/models/nomic-embed
    # Uncomment for Intel Arc GPU acceleration:
    # devices:
    #   - ${INTEL_DRI_DEVICE:-/dev/dri}:${INTEL_DRI_DEVICE:-/dev/dri}
    # group_add:
    #   - "${INTEL_VIDEO_GID:-39}"
    #   - "${INTEL_RENDER_GID:-105}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8105/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # aichat-web: Dartboard web server + frontend (port 8200 internal)
  #   Dart/Shelf server serving the vanilla JS SPA.
  #   Connects to MCP, LM Studio (RTX 3090), and Arc A380 (tool router).
  # ---------------------------------------------------------------------------
  aichat-web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    environment:
      PORT: "8200"
      MCP_URL: http://aichat-mcp:8096
      TOOL_ROUTER_URL: http://host.docker.internal:1235
      LM_STUDIO_URL: http://192.168.50.2:1234
      LM_STUDIO_FALLBACK_URL: http://100.78.39.76:1234
      COMFYUI_URL: "${COMFYUI_URL:-http://aichat-comfyui:8388}"
      HF_TOKEN: "${HF_TOKEN:-}"
      VISION_GEN_URL: http://aichat-vision:8099/generate
      DB_PATH: /app/data/dartboard.db
      WEB_DIR: /app/web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      aichat-mcp:
        condition: service_healthy
    volumes:
      - /mnt/nvmeINT/aichat/web-db:/app/data
      - /home/jalsarraf/aipictures:/app/pictures
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8200/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # aichat-auth: Flask JWT auth proxy + admin panel
  #   User-facing: 8200 (proxies to aichat-web)
  #   Admin panel: 8247 (LAN/Tailscale only)
  # ---------------------------------------------------------------------------
  aichat-auth:
    build: ./docker/auth
    ports:
      - "8200:8200"
      - "8247:8247"
    environment:
      DARTBOARD_URL: http://aichat-web:8200
      DATABASE_URL: postgresql://aichat:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@aichat-db:5432/aichat
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-12}
      ADMIN_USER: ${ADMIN_USER:-jalsarraf}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-}
      ENABLE_TLS: "${ENABLE_TLS:-0}"
    depends_on:
      aichat-web:
        condition: service_healthy
      aichat-db:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # aichat-comfyui: ComfyUI image generation server (NVIDIA GPU required)
  #   RTX 3090 on dominus. Runs with --listen to accept remote connections.
  #   Models live in the comfyui-models volume, populated by model-downloader.
  # ---------------------------------------------------------------------------
  aichat-comfyui:
    image: ghcr.io/ai-dock/comfyui:latest
    environment:
      CLI_ARGS: "--listen 0.0.0.0 --port 8388"
    volumes:
      - comfyui-models:/opt/ComfyUI/models
      - comfyui-output:/opt/ComfyUI/output
      - comfyui-input:/opt/ComfyUI/input
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8388/system_stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles:
      - gpu

  # ---------------------------------------------------------------------------
  # model-downloader: One-shot service to download ComfyUI models from HF
  #   Usage: docker compose --profile models run --rm model-downloader
  #   Idempotent — skips files that already exist.
  # ---------------------------------------------------------------------------
  model-downloader:
    build: ./docker/comfyui
    environment:
      HF_TOKEN: "${HF_TOKEN:-}"
      COMFYUI_MODELS_DIR: /models
    volumes:
      - comfyui-models:/models
    profiles:
      - models

volumes:
  aichatdb:       # PostgreSQL data
  datadb:         # aichat-data: legacy SQLite (migrated to PostgreSQL; safe to remove after confirmed migration)
  qdrantdb:       # Qdrant vector storage
  whatsappauth:   # WhatsApp session credentials
  miniodata:      # MinIO object storage
  comfyui-models: # ComfyUI model weights (checkpoints, unets, clip, vae)
  comfyui-output: # ComfyUI generated images
  comfyui-input:  # ComfyUI uploaded reference images
